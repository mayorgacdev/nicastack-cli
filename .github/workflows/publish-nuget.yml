name: Publish NuGet Tool

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "PACKAGE_VERSION=0.1.0-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Restore
        run: dotnet restore NicaStack.Cli/NicaStack.Cli.csproj

      - name: Build
        run: dotnet build NicaStack.Cli/NicaStack.Cli.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack NicaStack.Cli/NicaStack.Cli.csproj -c Release --no-build -p:ContinuousIntegrationBuild=true -p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: Validate NuGet API key
        if: github.ref_type == 'tag'
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "${NUGET_API_KEY}" ]]; then
            echo "::error::Missing NUGET_API_KEY secret. Add it in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Publish to NuGet
        if: github.ref_type == 'tag'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "NicaStack.Cli/nupkg/*.nupkg" --api-key "${NUGET_API_KEY}" --source https://api.nuget.org/v3/index.json --skip-duplicate